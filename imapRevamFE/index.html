<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      try {
        var k = "mantine-color-scheme-value";
        var _colorScheme = localStorage.getItem(k);
        var colorScheme =
          _colorScheme === "light" || _colorScheme === "dark"
            ? _colorScheme
            : "dark";
        document.documentElement.setAttribute(
          "data-mantine-color-scheme",
          colorScheme
        );
      } catch (e) {}
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/rightlogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incident Management</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="tooltip-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
